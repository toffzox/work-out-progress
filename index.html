
<style>
/* ═══════════════════════════════════════════════════════
   WORKOUT DAY CARDS
═══════════════════════════════════════════════════════ */
.day-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 1.25rem;
}

.day-card {
  border: 1.5px solid var(--color-border-tertiary);
  border-radius: 12px;
  padding: 12px 8px 10px;
  cursor: pointer;
  background: var(--color-background-primary);
  text-align: center;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: border-color .18s ease, background .18s ease, transform .1s ease;
}

.day-card[data-day="A"] { --dc: #c94e30; }
.day-card[data-day="B"] { --dc: #2d6fd4; }
.day-card[data-day="C"] { --dc: #1e9e66; }

.day-card:hover { opacity: .88; }
.day-card:active { transform: scale(.96); }

.day-card.on {
  border-color: var(--dc);
  background: color-mix(in srgb, var(--dc) 9%, var(--color-background-primary));
}

.dc-bar {
  width: 24px; height: 3px;
  border-radius: 2px;
  background: var(--color-border-tertiary);
  margin: 0 auto 8px;
  transition: background .18s ease;
}
.day-card.on .dc-bar { background: var(--dc); }

.dc-num {
  font-size: 10px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--color-text-secondary);
  margin-bottom: 3px;
  transition: color .18s ease;
}
.day-card.on .dc-num { color: var(--dc); }

.dc-name {
  font-size: 13px; font-weight: 600;
  color: var(--color-text-primary);
  line-height: 1.25;
  margin-bottom: 2px;
}

.dc-sub {
  font-size: 11px;
  color: var(--color-text-secondary);
  line-height: 1.3;
}

/* ═══════════════════════════════════════════════════════
   QUICK EXERCISE CHIPS
═══════════════════════════════════════════════════════ */
#chips-wrap {
  display: none;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 0.5px solid var(--color-border-tertiary);
}
#chips-wrap.visible { display: block; }

.chips-title {
  font-size: 11px;
  color: var(--color-text-secondary);
  margin-bottom: 7px;
}

.chips-list {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.xchip {
  font-size: 12px;
  padding: 4px 11px;
  border-radius: 100px;
  border: 1px solid var(--color-border-tertiary);
  background: transparent;
  color: var(--color-text-secondary);
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
  transition: border-color .12s ease, color .12s ease, background .12s ease;
}
.xchip:hover {
  border-color: var(--xc);
  color: var(--xc);
  background: color-mix(in srgb, var(--xc) 8%, transparent);
}
.xchip:active { transform: scale(.95); }

/* ═══════════════════════════════════════════════════════
   DAY BADGE IN LOG
═══════════════════════════════════════════════════════ */
.dbadge {
  display: inline-block;
  font-size: 9px; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px;
  vertical-align: middle;
}
.dbadge-A { background: rgba(201,78,48,.13); color: #c94e30; }
.dbadge-B { background: rgba(45,111,212,.13); color: #2d6fd4; }
.dbadge-C { background: rgba(30,158,102,.13); color: #1e9e66; }

/* ═══════════════════════════════════════════════════════
   FILTER PILLS
═══════════════════════════════════════════════════════ */
.filter-pills-row {
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin-bottom: 10px;
  padding-bottom: 2px;
  scrollbar-width: none;
}
.filter-pills-row::-webkit-scrollbar { display: none; }

.fpill {
  font-size: 12px;
  padding: 4px 11px;
  border-radius: 100px;
  border: 1px solid var(--color-border-tertiary);
  background: transparent;
  color: var(--color-text-secondary);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  font-family: inherit;
  transition: border-color .12s ease, color .12s ease, background .12s ease;
}
.fpill.fa { border-color: #c94e30; color: #c94e30; background: rgba(201,78,48,.09); }
.fpill.fb { border-color: #2d6fd4; color: #2d6fd4; background: rgba(45,111,212,.09); }
.fpill.fc { border-color: #1e9e66; color: #1e9e66; background: rgba(30,158,102,.09); }

/* ═══════════════════════════════════════════════════════
   DATE GROUP HEADER
═══════════════════════════════════════════════════════ */
.date-header {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.date-label {
  font-size: 12px;
  color: var(--color-text-secondary);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ═══════════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════════ */
@media (max-width: 400px) {
  .dc-name { font-size: 12px; }
  .dc-sub { font-size: 10px; }
  .day-card { padding: 10px 4px 8px; }
  .dc-bar { width: 20px; }
}
</style>

<script>
// ── Exercise data per day ────────────────────────────────────────
const DAY_DATA = {
  A: {
    label: 'День A',
    name: 'Груди + Біцепс',
    color: '#c94e30',
    exercises: [
      'Жим лежачи зі штангою',
      'Жим гантелей лежачи',
      'Жим під кутом вгору',
      'Жим гантелей під кутом',
      'Розведення гантелей лежачи',
      'Кроссовер на блоці',
      'Підйом на біцепс зі штангою',
      'Підйом на біцепс з гантелями',
      'Молотки',
      'Сконцентровані згинання',
    ]
  },
  B: {
    label: 'День B',
    name: 'Спина + Тріцепс',
    color: '#2d6fd4',
    exercises: [
      'Підтягування',
      'Тяга верхнього блоку',
      'Горизонтальна тяга',
      'Тяга штанги в нахилі',
      'Тяга гантелі в нахилі',
      'Тяга Т-грифа',
      'Гіперекстензія',
      'Розгинання на блоці',
      'Французький жим',
      'Відтискання на брусах',
      'Жим вузьким хватом',
    ]
  },
  C: {
    label: 'День C',
    name: 'Ноги + Плечі',
    color: '#1e9e66',
    exercises: [
      'Присідання зі штангою',
      'Жим ногами',
      'Розгинання ніг',
      'Згинання ніг',
      'Випади',
      'Ікри стоячи',
      'Армійський жим',
      'Жим гантелей сидячи',
      'Розведення гантелей стоячи',
      'Тяга до підборіддя',
      'Підйом гантелей в сторони',
    ]
  }
};

// ── Init ─────────────────────────────────────────────────────────
const today = new Date().toISOString().split('T')[0];
document.getElementById('date-input').value = today;
document.getElementById('current-date').textContent = new Date().toLocaleDateString('uk-UA', {
  weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
});

let entries = JSON.parse(localStorage.getItem('gym-tracker') || '[]');
let selectedDay = null;
let activeDayFilter = null;

// ── Day card selection ────────────────────────────────────────────
function selectDay(day) {
  selectedDay = (selectedDay === day) ? null : day;

  document.querySelectorAll('.day-card').forEach(card => {
    card.classList.toggle('on', card.dataset.day === selectedDay);
  });

  const chipsWrap = document.getElementById('chips-wrap');
  const chipsList = document.getElementById('chips-list');

  if (selectedDay) {
    const d = DAY_DATA[selectedDay];
    chipsWrap.classList.add('visible');
    chipsList.innerHTML = d.exercises.map(ex =>
      `<button class="xchip" style="--xc:${d.color}" onclick="fillExercise(this)"
        data-name="${ex.replace(/"/g, '&quot;')}">${ex}</button>`
    ).join('');
  } else {
    chipsWrap.classList.remove('visible');
    chipsList.innerHTML = '';
  }
}

function fillExercise(btn) {
  document.getElementById('exercise-input').value = btn.dataset.name;
  document.getElementById('set-input').focus();
}

// ── Day filter ────────────────────────────────────────────────────
function toggleDayFilter(day) {
  activeDayFilter = (activeDayFilter === day) ? null : day;
  if (activeDayFilter) document.getElementById('filter-date').value = '';

  document.getElementById('fpill-A').className = 'fpill' + (activeDayFilter === 'A' ? ' fa' : '');
  document.getElementById('fpill-B').className = 'fpill' + (activeDayFilter === 'B' ? ' fb' : '');
  document.getElementById('fpill-C').className = 'fpill' + (activeDayFilter === 'C' ? ' fc' : '');

  renderLog();
}

function onDateFilter() {
  if (document.getElementById('filter-date').value) {
    // clear day filter when date is picked
    activeDayFilter = null;
    document.getElementById('fpill-A').className = 'fpill';
    document.getElementById('fpill-B').className = 'fpill';
    document.getElementById('fpill-C').className = 'fpill';
  }
  renderLog();
}

// ── Core CRUD ─────────────────────────────────────────────────────
function saveData() {
  localStorage.setItem('gym-tracker', JSON.stringify(entries));
}

function addEntry() {
  const exercise = document.getElementById('exercise-input').value.trim();
  const date = document.getElementById('date-input').value;
  const set = parseInt(document.getElementById('set-input').value);
  const weight = parseFloat(document.getElementById('weight-input').value);
  const reps = parseInt(document.getElementById('reps-input').value);

  if (!exercise || !date || !reps) {
    alert('Заповни хоча б вправу, дату і кількість повторень');
    return;
  }

  entries.push({
    id: Date.now(),
    exercise, date,
    set: set || 1,
    weight: weight || 0,
    reps,
    dayType: selectedDay
  });
  saveData();
  renderLog();
  updateStats();

  document.getElementById('set-input').value = '';
  document.getElementById('weight-input').value = '';
  document.getElementById('reps-input').value = '';

  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  setTimeout(() => fb.style.display = 'none', 1500);
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  saveData();
  renderLog();
  updateStats();
}

function updateStats() {
  const todayEntries = entries.filter(e => e.date === today);
  document.getElementById('stat-sets').textContent = todayEntries.length;
  const exs = new Set(todayEntries.map(e => e.exercise));
  document.getElementById('stat-exercises').textContent = exs.size;
  const vol = todayEntries.reduce((s, e) => s + (e.weight * e.reps), 0);
  document.getElementById('stat-volume').textContent = Math.round(vol);
}

// ── Render log ────────────────────────────────────────────────────
function renderLog() {
  const filterDate = document.getElementById('filter-date').value;

  let filtered = entries;
  if (filterDate) filtered = filtered.filter(e => e.date === filterDate);
  if (activeDayFilter) filtered = filtered.filter(e => e.dayType === activeDayFilter);

  const sorted = [...filtered].sort((a, b) => b.id - a.id);

  const container = document.getElementById('log-container');
  if (!sorted.length) {
    container.innerHTML = '<p style="font-size: 14px; color: var(--color-text-secondary); text-align: center; padding: 2rem 0;">Записів не знайдено</p>';
    return;
  }

  // Group by date+exercise+dayType
  const grouped = {};
  sorted.forEach(e => {
    const key = e.date + '|' + e.exercise + '|' + (e.dayType || '');
    if (!grouped[key]) grouped[key] = { date: e.date, exercise: e.exercise, dayType: e.dayType || null, sets: [] };
    grouped[key].sets.push(e);
  });

  // Group exercise groups by date
  const byDate = {};
  Object.values(grouped).forEach(g => {
    if (!byDate[g.date]) byDate[g.date] = [];
    byDate[g.date].push(g);
  });

  const dates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));

  container.innerHTML = dates.map(date => {
    const label = date === today
      ? 'Сьогодні'
      : new Date(date + 'T12:00:00').toLocaleDateString('uk-UA', { day: 'numeric', month: 'long', year: 'numeric' });

    const groups = byDate[date];

    // Unique day types for this date → header badges
    const dayTypes = [...new Set(groups.map(g => g.dayType).filter(Boolean))];
    const headerBadges = dayTypes.map(dt =>
      `<span class="dbadge dbadge-${dt}">${DAY_DATA[dt].label} · ${DAY_DATA[dt].name}</span>`
    ).join(' ');

    const exerciseCards = groups.map(g => `
      <div style="background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 14px; margin-bottom: 8px;">
        <p style="font-size: 14px; font-weight: 500; margin: 0 0 8px; color: var(--color-text-primary);">${g.exercise}</p>
        <div style="display: flex; flex-wrap: wrap; gap: 6px;">
          ${g.sets.map(s => `
            <div style="display: flex; align-items: center; gap: 6px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 4px 10px; font-size: 13px;">
              <span style="color: var(--color-text-secondary);">п.${s.set}</span>
              <span style="color: var(--color-text-primary); font-weight: 500;">${s.weight > 0 ? s.weight + ' кг' : 'без ваги'} × ${s.reps}</span>
              <button onclick="deleteEntry(${s.id})" style="background: none; border: none; cursor: pointer; padding: 0; color: var(--color-text-tertiary); font-size: 14px; line-height: 1;" aria-label="Видалити">
                <i class="ti ti-x"></i>
              </button>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');

    return `
      <div style="margin-bottom: 1rem;">
        <div class="date-header">
          <span class="date-label">${label}</span>
          ${headerBadges}
        </div>
        ${exerciseCards}
      </div>
    `;
  }).join('');
}

// ── Filter clear ──────────────────────────────────────────────────
function clearFilter() {
  document.getElementById('filter-date').value = '';
  activeDayFilter = null;
  document.getElementById('fpill-A').className = 'fpill';
  document.getElementById('fpill-B').className = 'fpill';
  document.getElementById('fpill-C').className = 'fpill';
  renderLog();
}

// ── Export ────────────────────────────────────────────────────────
function exportData() {
  const filterDate = document.getElementById('filter-date').value;
  const filtered = filterDate ? entries.filter(e => e.date === filterDate) : entries;
  const sorted = [...filtered].sort((a, b) => a.date.localeCompare(b.date) || a.id - b.id);

  let csv = 'Дата,День,М\'язи,Вправа,Підхід,Вага (кг),Повторень\n';
  sorted.forEach(e => {
    const dt = e.dayType ? DAY_DATA[e.dayType] : null;
    const dayLabel = dt ? dt.label : '';
    const muscles = dt ? dt.name : '';
    csv += `${e.date},${dayLabel},${muscles},${e.exercise},${e.set},${e.weight},${e.reps}\n`;
  });

  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'тренування.csv';
  a.click();
  URL.revokeObjectURL(url);
}

renderLog();
updateStats();
</script>
